<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설 설계자 (Novel Architect)</title>
    <style>
        /* CSS 스타일: 디자인을 담당합니다 */
        body { background-color: #f4f7f6; font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 600px; width: 100%; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #4a7c59; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        textarea { height: 80px; resize: none; }
        button { width: 100%; padding: 15px; background: #4a7c59; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 17px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #3d664a; }
        .result-section { margin-top: 30px; display: none; border-top: 2px dashed #ccc; padding-top: 20px; }
        .plot-item { background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-left: 5px solid #4a7c59; border-radius: 5px; }
        .plot-label { font-weight: bold; color: #4a7c59; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>✍️ 소설 설계자</h1>
    <p style="text-align:center; color:#666;">빈칸을 채우면 소설의 뼈대를 만들어 드립니다.</p>

    <div class="input-form">
        <div class="input-group">
            <label>1. 기초 경험 (힘들었던 일)</label>
            <textarea id="experience" placeholder="예: 친구들과 멀어져서 슬펐던 기억"></textarea>
        </div>
        
        <div class="input-group">
            <label>2. 갈등 양상 선택</label>
            <select id="conflictType">
                <option value="내적 갈등">내적 갈등 (자신의 마음속 불안, 고민)</option>
                <option value="인물 간의 갈등">인물 간의 갈등 (친구, 가족과의 다툼)</option>
                <option value="사회와의 갈등">사회와의 갈등 (학교 규칙, 사회적 편견)</option>
            </select>
        </div>

        <div class="input-group">
            <label>3. 갈등 해결 방법</label>
            <input type="text" id="solution" placeholder="예: 진심 어린 사과, 새로운 친구 사귀기">
        </div>

        <div class="input-group">
            <label>4. 주인공의 성격</label>
            <input type="text" id="character" placeholder="예: 상황 판단이 빠르지만 여린">
        </div>

        <div class="input-group">
            <label>5. 소설의 메시지 (주제)</label>
            <input type="text" id="message" placeholder="예: 나를 소중히 여기는 법 배우기">
        </div>

        <button onclick="generateNovel()">상세 소설 시놉시스 생성</button>
    </div>

    <div id="resultSection" class="result-section">
        <h2 style="text-align:center;">📖 추천 시놉시스</h2>
        <div class="plot-item">
            <span class="plot-label">기 (起): 사건의 시작</span>
            <p id="part1"></p>
        </div>
        <div class="plot-item">
            <span class="plot-label">승 (承): 갈등의 심화</span>
            <p id="part2"></p>
        </div>
        <div class="plot-item">
            <span class="plot-label">전 (轉): 전환점</span>
            <p id="part3"></p>
        </div>
        <div class="plot-item">
            <span class="plot-label">결 (結): 마무리</span>
            <p id="part4"></p>
        </div>
        <button onclick="location.reload()" style="background:#888;">새로 만들기</button>
    </div>
</div>

<script>
    /* 자바스크립트: 버튼을 누르면 실행되는 기능을 담당합니다 */
    function generateNovel() {
        const exp = document.getElementById('experience').value;
        const con = document.getElementById('conflictType').value;
        const sol = document.getElementById('solution').value;
        const cha = document.getElementById('character').value;
        const msg = document.getElementById('message').value;

        if (!exp || !sol || !cha || !msg) {
            alert('모든 항목을 입력해 주세요!');
            return;
        }

        // 결과창 보이기
        document.getElementById('resultSection').style.display = 'block';

        // 내용 채우기
        document.getElementById('part1').innerText = 
            cha + " 성격의 주인공이 '" + exp + "'라는 일을 겪으며 소설이 시작됩니다.";
        document.getElementById('part2').innerText = 
            "주인공은 이 상황에서 '" + con + "'을(를) 느끼며 큰 위기를 맞이하고 깊은 슬픔에 빠집니다.";
        document.getElementById('part3').innerText = 
            "하지만 주인공은 포기하지 않고 '" + sol + "'(이)라는 행동을 통해 갈등을 극복하기 시작합니다.";
        document.getElementById('part4').innerText = 
            "결국 주인공은 '" + msg + "'라는 깨달음을 얻으며, 이전보다 더 단단해진 모습으로 성장합니다.";

        // 화면 아래로 스크롤
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
